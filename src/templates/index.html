<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoMate Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="glow-bg"></div>
    <div class="container">
        <header>
            <div class="logo">
                <i class="fa-solid fa-bolt-lightning blue-accent"></i> AutoMate <span class="badge">PRO</span>
            </div>
            <button id="sync-btn" class="btn primary-btn"><i class="fa-solid fa-rotate"></i> Sync Now</button>
        </header>

        <div class="dashboard-grid">
            <div class="stats-card glass">
                <div class="stat-icon"><i class="fa-solid fa-server"></i></div>
                <div class="stat-details">
                    <h3>Agent Status</h3>
                    <div id="status-badge" class="status-indicator active">
                        <span class="pulse"></span> <span id="status-text">Checking...</span>
                    </div>
                </div>
            </div>

            <div class="stats-card glass">
                <div class="stat-icon"><i class="fa-solid fa-clock"></i></div>
                <div class="stat-details">
                    <h3>Last Sync Time</h3>
                    <div class="highlight" id="last-sync-time">Checking...</div>
                </div>
            </div>

            <div class="stats-card glass">
                <div class="stat-icon"><i class="fa-solid fa-database"></i></div>
                <div class="stat-details">
                    <h3>Power BI Connection</h3>
                    <div class="status-indicator active"><span class="pulse"></span> Live</div>
                </div>
            </div>
        </div>

        <div class="logs-container glass">
            <div class="logs-header">
                <h3><i class="fa-solid fa-terminal"></i> Terminal Logs</h3>
                <div id="loading-spinner" class="spinner" style="opacity: 0.5; font-size: 0.9rem;">
                    <i class="fa-solid fa-circle-notch fa-spin"></i> Live
                </div>
            </div>
            <pre id="log-window" class="log-window"></pre>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>

</html>
